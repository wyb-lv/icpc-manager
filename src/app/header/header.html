<header class="p-3 mb-3 border-bottom border-secondary glass-header">
  <div class="container-fluid d-flex justify-content-between align-items-center">

    <div class="text-white">
      <span class=" small text-uppercase">Management System</span>
      <h5 class="m-0 fw-bold">ICPC Contest</h5>
    </div>

    <div class="d-flex align-items-center gap-3">
      <!-- User Menu (when logged in) -->
      @if (authService.isAuthenticated()) {
      <div class="dropdown">
        <button class="btn btn-outline-light border-0 dropdown-toggle d-flex align-items-center gap-2" type="button"
          data-bs-toggle="dropdown" aria-expanded="false">
          <!-- User Avatar -->
          @if (authService.currentUser()?.photoURL) {
          <img [src]="authService.currentUser()?.photoURL" alt="User" class="rounded-circle"
            style="width: 32px; height: 32px; object-fit: cover;">
          } @else {
          <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center"
            style="width: 32px; height: 32px;">
            <i class="bi bi-person-fill text-white"></i>
          </div>
          }
          <span class="text-white d-none d-md-inline">
            {{ authService.currentUser()?.displayName || (authService.currentUser()?.email ?
            authService.currentUser()!.email!.split('@')[0] : 'User') }}
          </span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
          <li>
            <span class="dropdown-item-text text-secondary small">
              {{ authService.currentUser()?.email }}
            </span>
          </li>
          <li>
            <hr class="dropdown-divider">
          </li>
          <li>
            <button class="dropdown-item text-danger" (click)="authService.logout()">
              <i class="bi bi-box-arrow-right me-2"></i>Logout
            </button>
          </li>
        </ul>
      </div>
      } @else {
      <!-- Login Button (when not logged in) -->
      <a routerLink="/login" class="btn btn-primary">
        <i class="bi bi-box-arrow-in-right me-1"></i>Login
      </a>
      }
    </div>
  </div>
</header>
