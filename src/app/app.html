<!-- Auth pages (login/register) - No header, sidebar, footer -->
@if (isAuthPage()) {
<router-outlet></router-outlet>
} @else {
<!-- Regular pages with full layout -->
<div class="d-flex h-100 w-100 overflow-hidden app-container">

  <aside class="sidebar-wrapper">
    <app-sidebar></app-sidebar>
  </aside>

  <div class="d-flex flex-column flex-grow-1 position-relative content-wrapper">

    <app-header></app-header>

    <main class="flex-grow-1 overflow-auto p-3">
      <router-outlet></router-outlet>
    </main>

    <app-footer></app-footer>
  </div>
</div>
}
